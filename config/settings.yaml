project:
  name: "POC Project"

universe:
  mode: "csv_list"   # manual | txt_list | csv_list | tls

  manual:
    symbols: ["SPY", "AAPL", "MSFT"]   # libovolný seznam tickerů

  txt_list:
    path: "input/watchlists/watchlist.txt"   # např. watchlist.txt / us_etf.txt / forex.txt

  csv_list:
    path: "input/watchlists/watchlist.csv"   # např. watchlist.csv / us_stocks.csv / etf_list.csv
    column: "Symbol"   # Symbol | Ticker | symbol | ticker

  tls:
    path: "input/watchlists/watchlist.tls"   # AmiBroker TLS soubor

data_source:
  mode: "yahoo"   # yahoo | csv | ib

paths:
  raw_data_dir: "data/raw"   # složka pro raw OHLCV data
  processed_data_dir: "data/processed"   # složka pro výstupy projektu

csv:
  file_pattern: "{symbol}.csv"   # {symbol}.csv | {ticker}.csv | {symbol}_daily.csv | {ticker}_ohlcv.csv

yahoo:
  period: "10y"   # 1mo | 3mo | 6mo | 1y | 2y | 5y | 10y | max
  interval: "1d"   # 1d | 1wk | 1mo | 1h | 30m | 15m | 5m | 1m
  auto_adjust: false   # true | false
  save_downloaded_csv: true   # true | false

ib:
  host: "127.0.0.1"   # 127.0.0.1 | localhost | jiná IP
  port: 7497   # často: 7497 TWS paper | 7496 TWS live | 4001 Gateway live | 4002 Gateway paper
  client_id: 1   # libovolné volné client ID

poc:
  periods:
    weekly: false   # true | false
    monthly: true   # true | false
    yearly: true   # true | false

  keep_last:
    weekly: 0   # např. 3 | 5 | 10
    monthly: 15   # např. 3 | 5 | 12
    yearly: 5   # např. 1 | 3 | 5

  level_status:
    enabled: true   # true | false
    track_touch: true   # true | false
    track_cross: true   # true | false

  nearest_untouched:
    enabled: true   # true | false
    save_summary_csv: true   # true | false
    summary_csv_path: "data/processed/poc_nearest_summary.csv"   # cesta k souhrnnému CSV

dashboard:
  auto_open: true   # true | false
  default_data_source: "project_default"   # project_default | archived_run | external_disk | custom_export

  data_sources:
    project_default:
      raw_data_dir: "data/raw"
      processed_data_dir: "data/processed"
      raw_file_pattern: "{ticker}.csv"   # {ticker}.csv | {symbol}.csv | {ticker}_daily.csv
      poc_file_pattern: "{ticker}_poc.csv"   # {ticker}_poc.csv | {symbol}_poc.csv

    archived_run:
      raw_data_dir: "archive/2026-03-09/raw"
      processed_data_dir: "archive/2026-03-09/processed"
      raw_file_pattern: "{ticker}.csv"
      poc_file_pattern: "{ticker}_poc.csv"

    external_disk:
      raw_data_dir: "/mnt/storage/poc/raw"
      processed_data_dir: "/mnt/storage/poc/processed"
      raw_file_pattern: "{ticker}.csv"
      poc_file_pattern: "{ticker}_poc.csv"

    custom_export:
      raw_data_dir: "exports/raw"
      processed_data_dir: "exports/processed"
      raw_file_pattern: "{ticker}_daily.csv"
      poc_file_pattern: "{ticker}_poc.csv"
