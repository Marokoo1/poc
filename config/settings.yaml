project:
  name: "POC Project"

universe:
  mode: "csv_list"
  manual:
    symbols: ["SPY", "AAPL", "MSFT"]
  txt_list:
    path: "input/watchlists/watchlist.txt"
  csv_list:
    path: "input/watchlists/watchlist.csv"
    column: "Symbol"
  tls:
    path: "input/watchlists/watchlist.tls"

data_source:
  mode: "yahoo"   # yahoo | csv | ib

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"

csv:
  file_pattern: "{symbol}.csv"

yahoo:
  period: "2y"
  interval: "1d"
  auto_adjust: false
  save_downloaded_csv: true

ib:
  host: "127.0.0.1"
  port: 7497
  client_id: 1

poc:
  periods:
    weekly: true
    monthly: true
    yearly: true
  keep_last:
    weekly: 5
    monthly: 5
    yearly: 3
  level_status:
    enabled: true
    track_touch: true
    track_cross: true
  nearest_untouched:
    enabled: true
    save_summary_csv: true
    summary_csv_path: "data/processed/poc_nearest_summary.csv"

dashboard:
  auto_open: true
  default_data_source: "project_default"
  data_sources:
    project_default:
      raw_data_dir: "data/raw"
      processed_data_dir: "data/processed"
      raw_file_pattern: "{ticker}.csv"
      poc_file_pattern: "{ticker}_poc.csv"

    archived_run:
      raw_data_dir: "archive/2026-03-09/raw"
      processed_data_dir: "archive/2026-03-09/processed"
      raw_file_pattern: "{ticker}.csv"
      poc_file_pattern: "{ticker}_poc.csv"

    external_disk:
      raw_data_dir: "/mnt/storage/poc/raw"
      processed_data_dir: "/mnt/storage/poc/processed"
      raw_file_pattern: "{ticker}.csv"
      poc_file_pattern: "{ticker}_poc.csv"

    custom_export:
      raw_data_dir: "exports/raw"
      processed_data_dir: "exports/processed"
      raw_file_pattern: "{ticker}_daily.csv"
      poc_file_pattern: "{ticker}_poc.csv"
