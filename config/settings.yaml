project:
  name: "POC Project"

universe:
  mode: "csv_list"   # manual | txt_list | csv_list | tls

  manual:
    symbols:
      - SPY
      - AAPL
      - MSFT

  txt_list:
    path: "input/watchlists/watchlist.txt"

  csv_list:
    path: "input/watchlists/watchlist.csv"
    column: "Symbol"

  tls:
    path: "input/watchlists/watchlist.tls"

data_source:
  mode: "yahoo"   # yahoo | csv | ib

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"

csv:
  file_pattern: "{symbol}.csv"

yahoo:
  period: "2y"
  interval: "1d"
  auto_adjust: false
  save_downloaded_csv: true

ib:
  host: "127.0.0.1"
  port: 7497
  client_id: 1

poc:
  periods:
    weekly: true
    monthly: true
    yearly: true

  keep_last:
    weekly: 2
    monthly: 2
    yearly: 1

  level_status:
    enabled: true
    track_touch: true
    track_cross: true
